name: eBay Auth Test

on:
  workflow_dispatch:

jobs:
  auth-test:
    runs-on: ubuntu-latest
    steps:
      - name: Get eBay app token
        shell: bash
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: |
          AUTH=$(printf "%s:%s" "$EBAY_CLIENT_ID" "$EBAY_CLIENT_SECRET" | base64)

          curl --request POST --silent --show-error \
            --url "https://api.ebay.com/identity/v1/oauth2/token" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --header "Authorization: Basic $AUTH" \
            --data "grant_type=client_credentials&scope=https%3A%2F%2Fapi.ebay.com%2Foauth%2Fapi_scope" \
            --output response.json

          cat response.json

          python -c "import json,sys; d=json.load(open('response.json')); sys.exit(0 if 'access_token' in d else 1)"
