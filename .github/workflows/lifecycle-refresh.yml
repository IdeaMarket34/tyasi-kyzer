name: lifecycle-refresh

on:
  # Scheduled by pg_cron in Supabase via trigger_github_workflow().
  # Do NOT add a schedule: block here — pg_cron is the sole trigger.
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      REFRESH_BATCH_SIZE: 100
      STALE_HOURS: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install -r requirements.txt
      - run: python lifecycle_refresh_worker.py
