name: discovery-collector

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      EBAY_MARKETPLACE_ID: EBAY_US
      MAX_SEARCH_CALLS_PER_RUN: 250
      SEARCH_PLAN_LIMIT: 50
      MAX_PAGES_PER_PLAN: 5
      DISCOVERY_PAGE_SIZE: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install -r requirements.txt
      - run: python discovery_collector.py
