name: discovery-collector

on:
  # Scheduled by pg_cron in Supabase via trigger_github_workflow().
  # Do NOT add a schedule: block here — pg_cron is the sole trigger.
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      EBAY_MARKETPLACE_ID: EBAY_US
      MAX_SEARCH_CALLS_PER_RUN: 250
      SEARCH_PLAN_LIMIT: 50
      MAX_PAGES_PER_PLAN: 5
      DISCOVERY_PAGE_SIZE: 50
      # Minimum seconds between eBay API calls — primary 429 prevention.
      # 0.5s caps throughput at ~120 calls/min, well under eBay's rate limit.
      INTER_REQUEST_DELAY_S: "0.5"
      # Max retries per request on 429 before aborting the current plan cleanly.
      # Keeping this low prevents retry loops from consuming the entire run window.
      MAX_429_RETRIES: "2"
      # Skip plans whose last_success_at is within this many minutes.
      # Set to 50 to prevent back-to-back manual triggers from double-burning quota.
      # Set to 0 to disable (processes all active plans every run).
      PLAN_COOLDOWN_MINUTES: "50"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install -r requirements.txt
      - run: python discovery_collector.py