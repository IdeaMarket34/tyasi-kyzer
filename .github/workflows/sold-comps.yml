name: Sold Comps

on:
  # Scheduled by pg_cron in Supabase via trigger_github_workflow().
  # Do NOT add a schedule: block here — pg_cron is the sole trigger.
  workflow_dispatch:

concurrency:
  group: sold-comps
  cancel-in-progress: false

jobs:
  collector:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sold comp collector
        env:
          APP_ENV: production
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOLDCOMPS_API_KEY: ${{ secrets.SOLDCOMPS_API_KEY }}
          SOLD_PROVIDER: soldcomps
          SOLD_BATCH_SIZE: "10"
          SOLD_MIN_HOURS_BETWEEN_RUNS: "24"
        run: python sold_comp_collector.py

  normalizer:
    runs-on: ubuntu-latest
    needs: collector
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sold comp normalizer
        env:
          APP_ENV: production
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python sold_comp_normalizer.py