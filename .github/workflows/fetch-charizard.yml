name: Fetch Charizard Listings

on:
  workflow_dispatch:

jobs:
  fetch-charizard:
    runs-on: ubuntu-latest
    steps:
      - name: Search eBay for Charizard listings
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: |
          python << 'PY'
          import os
          import json
          import base64
          import urllib.parse
          import urllib.request

          client_id = os.environ["EBAY_CLIENT_ID"]
          client_secret = os.environ["EBAY_CLIENT_SECRET"]

          credentials = f"{client_id}:{client_secret}"
          encoded = base64.b64encode(credentials.encode()).decode()

          token_data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "scope": "https://api.ebay.com/oauth/api_scope"
          }).encode()

          token_req = urllib.request.Request(
              "https://api.ebay.com/identity/v1/oauth2/token",
              data=token_data,
              headers={
                  "Authorization": f"Basic {encoded}",
                  "Content-Type": "application/x-www-form-urlencoded"
              },
              method="POST"
          )

          with urllib.request.urlopen(token_req) as resp:
              token_body = resp.read().decode()
              token_json = json.loads(token_body)
              access_token = token_json["access_token"]

          browse_url = "https://api.ebay.com/buy/browse/v1/item_summary/search?q=charizard&limit=25"
          browse_req = urllib.request.Request(
              browse_url,
              headers={
                  "Authorization": f"Bearer {access_token}",
                  "X-EBAY-C-MARKETPLACE-ID": "EBAY_US"
              },
              method="GET"
          )

          with urllib.request.urlopen(browse_req) as resp:
              body = resp.read().decode()
              data = json.loads(body)

          with open("charizard-results.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)

          items = data.get("itemSummaries", [])
          print(f"Found {len(items)} listings.")
          for i, item in enumerate(items[:10], start=1):
              title = item.get("title", "")
              price = (item.get("price") or {}).get("value", "")
              url = item.get("itemWebUrl", "")
              print(f"{i}. {title[:100]} | ${price} | {url}")
          PY

      - name: Upload Charizard results
        uses: actions/upload-artifact@v4
        with:
          name: charizard-results
          path: charizard-results.json
