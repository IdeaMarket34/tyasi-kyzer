name: detail-fetch

on:
  # Scheduled by pg_cron in Supabase via trigger_github_workflow().
  # Do NOT add a schedule: block here — pg_cron is the sole trigger.
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      EBAY_MARKETPLACE_ID: EBAY_US
      JOB_BATCH_SIZE: 100
      MAX_API_CALLS: 100
      REQUEST_TIMEOUT: 30
      WORKER_ID: github-actions-detail-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install -r requirements.txt
      - run: python detail_fetch_worker.py
